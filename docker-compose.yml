services:
  db:
    image: postgres:17
    container_name: estancia_ingresso_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INGRESSO_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${INGRESSO_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${INGRESSO_DB_NAME:-clestancia_sistema}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=trust"
    ports:
      - "${INGRESSO_DB_PORT:-54320}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
